global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Spring Boot Application Metrics
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
        labels:
          service: 'stock-tracking-app'
          environment: 'docker'

  # Toxiproxy Metrics (if available)
  - job_name: 'toxiproxy'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['toxiproxy:8474']
        labels:
          service: 'toxiproxy'
          environment: 'docker'
