name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────
  # CI: Test & Build
  # ─────────────────────────────────────────
  build-and-test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.2.2

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: ✅ Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🧪 Run backend tests
        run: ./gradlew test

      - name: 🏗️ Build backend JAR (skip tests)
        run: ./gradlew build -x test

      - name: 📊 Upload test report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🏗️ Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  # ─────────────────────────────────────────
  # CD: Docker Image Build & Push
  # ─────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    # Trigger on both main and master pushes
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata for App
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🐳 Build & Push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏷️ Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🐳 Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏷️ Extract metadata for IoT Simulator
        id: meta-iot
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-iot-simulator
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🐳 Build & Push IoT Simulator image
        uses: docker/build-push-action@v5
        with:
          context: ./iot-simulator
          push: true
          tags: ${{ steps.meta-iot.outputs.tags }}
          labels: ${{ steps.meta-iot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
