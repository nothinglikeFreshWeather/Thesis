server:
  port: 8080

spring:
  application:
    name: stock-tracking-system
  
  # MySQL Database Configuration (via Toxiproxy)
  datasource:
    url: jdbc:mysql://localhost:3307/stockdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Kafka Configuration (via Toxiproxy)
  kafka:
    bootstrap-servers: localhost:29093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 10
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "sensorData:com.example.Thesis.dto.SensorDataDto"
      group-id: warehouse-metrics-group
      auto-offset-reset: earliest
      max-poll-records: 500
    listener:
      poll-timeout: 3000
    topic:
      stock-events: stock-events
      warehouse-metrics: warehouse-metrics
  
  # Redis Configuration (via Toxiproxy)
  data:
    redis:
      host: localhost
      port: 26379  # Toxiproxy port for Redis master
      timeout: 5000ms
      
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# Cache Configuration
cache:
  ttl:
    stock: 300  # 5 minutes in seconds

# Rate Limit Configuration
rate-limit:
  global:
    capacity: 50        # Maksimum kova boyutu
    refill-tokens: 50   # Her yenilenmede verilecek token sayısı
    refill-duration-ms: 1000 # Hangi sıklıkla yenileneceği (1 saniye = 1000ms)

# Logging Configuration
logging:
  level:
    com.example.Thesis: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator and Metrics Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
